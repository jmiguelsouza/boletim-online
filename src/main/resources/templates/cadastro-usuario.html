<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(58, 130, 246, 0.22), transparent 22%),
                radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.20), transparent 26%),
                radial-gradient(circle at center top, rgba(191, 219, 254, 0.35), transparent 35%),
                linear-gradient(135deg, #d6e7ff 0%, #eaf3ff 35%, #f4f8ff 65%, #ddeaff 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        .fundo-luz {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(255,255,255,0.25), transparent 40%),
                linear-gradient(300deg, rgba(255,255,255,0.18), transparent 35%);
            pointer-events: none;
            z-index: 0;
        }

        .particulas {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particula {
            position: absolute;
            bottom: -40px;
            border-radius: 50%;
            background: rgba(45, 137, 239, 0.18);
            animation: subirParticula linear infinite;
        }

        .particula:nth-child(1) {
            left: 8%;
            width: 10px;
            height: 10px;
            animation-duration: 12s;
            animation-delay: 0s;
        }

        .particula:nth-child(2) {
            left: 18%;
            width: 16px;
            height: 16px;
            animation-duration: 16s;
            animation-delay: 2s;
        }

        .particula:nth-child(3) {
            left: 30%;
            width: 8px;
            height: 8px;
            animation-duration: 11s;
            animation-delay: 1s;
        }

        .particula:nth-child(4) {
            left: 42%;
            width: 14px;
            height: 14px;
            animation-duration: 18s;
            animation-delay: 4s;
        }

        .particula:nth-child(5) {
            left: 55%;
            width: 11px;
            height: 11px;
            animation-duration: 13s;
            animation-delay: 3s;
        }

        .particula:nth-child(6) {
            left: 68%;
            width: 18px;
            height: 18px;
            animation-duration: 17s;
            animation-delay: 5s;
        }

        .particula:nth-child(7) {
            left: 80%;
            width: 9px;
            height: 9px;
            animation-duration: 14s;
            animation-delay: 1.5s;
        }

        .particula:nth-child(8) {
            left: 90%;
            width: 13px;
            height: 13px;
            animation-duration: 15s;
            animation-delay: 6s;
        }

        .fundo-pontos {
            position: absolute;
            width: 260px;
            height: 260px;
            background-image: radial-gradient(rgba(45, 137, 239, 0.16) 1.4px, transparent 1.4px);
            background-size: 18px 18px;
            z-index: 0;
            opacity: 0.6;
            animation: moverPontos 16s ease-in-out infinite;
        }

        .pontos1 {
            top: 90px;
            right: 90px;
        }

        .pontos2 {
            bottom: 90px;
            left: 80px;
            opacity: 0.4;
            animation-delay: 2s;
        }

        .circuitos {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .circuito {
            position: absolute;
            opacity: 0.55;
            animation: pulsoCircuito 4s ease-in-out infinite;
        }

        .circuito .h {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, rgba(45, 137, 239, 0.0), rgba(45, 137, 239, 0.38), rgba(45, 137, 239, 0.0));
            border-radius: 999px;
        }

        .circuito .v {
            position: absolute;
            width: 2px;
            background: linear-gradient(180deg, rgba(45, 137, 239, 0.0), rgba(45, 137, 239, 0.38), rgba(45, 137, 239, 0.0));
            border-radius: 999px;
        }

        .circuito .no {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(90, 168, 255, 0.55);
            box-shadow: 0 0 10px rgba(90, 168, 255, 0.28);
        }

        .c1 {
            top: 120px;
            left: 90px;
            width: 220px;
            height: 120px;
        }

        .c1 .h1 { width: 150px; top: 20px; left: 0; }
        .c1 .v1 { height: 70px; top: 20px; left: 148px; }
        .c1 .h2 { width: 70px; top: 88px; left: 148px; }
        .c1 .n1 { top: 16px; left: 146px; }
        .c1 .n2 { top: 84px; left: 212px; }

        .c2 {
            top: 260px;
            right: 110px;
            width: 240px;
            height: 140px;
            animation-delay: 1.2s;
        }

        .c2 .v1 { height: 85px; top: 0; left: 70px; }
        .c2 .h1 { width: 130px; top: 83px; left: 70px; }
        .c2 .v2 { height: 55px; top: 83px; left: 198px; }
        .c2 .n1 { top: -2px; left: 66px; }
        .c2 .n2 { top: 79px; left: 194px; }
        .c2 .n3 { top: 132px; left: 194px; }

        .c3 {
            bottom: 140px;
            left: 160px;
            width: 200px;
            height: 120px;
            animation-delay: 2.2s;
        }

        .c3 .h1 { width: 120px; top: 40px; left: 0; }
        .c3 .v1 { height: 60px; top: 40px; left: 118px; }
        .c3 .h2 { width: 55px; top: 98px; left: 118px; }
        .c3 .n1 { top: 36px; left: 116px; }
        .c3 .n2 { top: 94px; left: 168px; }

        .fundo-circulo {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
            animation: flutuarSuave 10s ease-in-out infinite;
            filter: blur(1px);
        }

        .circulo1 {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(45, 137, 239, 0.28), rgba(45, 137, 239, 0.12));
            top: 20px;
            left: 25px;
        }

        .circulo2 {
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(93, 161, 255, 0.24), rgba(93, 161, 255, 0.10));
            bottom: 15px;
            right: 25px;
            animation-delay: 2s;
        }

        .circulo3 {
            width: 170px;
            height: 170px;
            background: radial-gradient(circle, rgba(147, 197, 253, 0.28), rgba(147, 197, 253, 0.10));
            top: 180px;
            right: 140px;
            animation-delay: 1s;
        }

        .container {
            width: 100%;
            max-width: 780px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            border: 1px solid #d7e6f7;
            box-shadow: 0 16px 40px rgba(31, 66, 122, 0.14);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: aparecer 0.5s ease;
        }

        .top-bar {
            height: 8px;
            background: linear-gradient(90deg, #0f63d3, #2d89ef, #57a5ff, #9fd0ff, #57a5ff, #2d89ef, #0f63d3);
            background-size: 300% 300%;
            animation: gradienteAzul 6s ease infinite;
            box-shadow: 0 2px 10px rgba(31, 111, 229, 0.18);
        }

        .content {
            padding: 35px;
        }

        .topo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
        }

        .icone {
            width: 62px;
            height: 62px;
            border-radius: 18px;
            background: linear-gradient(135deg, #1f6fe5, #5aa8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 8px 18px rgba(31, 111, 229, 0.22);
        }

        .titulo-area h1 {
            font-size: 1.9rem;
            color: #1d3557;
            font-weight: 700;
        }

        .titulo-area p {
            margin-top: 5px;
            color: #5a6d85;
            font-size: 0.98rem;
        }

        .linha {
            border: none;
            height: 1px;
            background: #d9e5f3;
            margin: 22px 0 26px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
        }

        .campo-full {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 7px;
            color: #28405d;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        input,
        select {
            width: 100%;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid #c9d8ea;
            background: #f9fbfe;
            color: #21364d;
            font-size: 0.96rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        input:hover,
        select:hover {
            border-color: #8bb9f1;
            background: #ffffff;
        }

        input:focus,
        select:focus {
            border-color: #2d89ef;
            box-shadow: 0 0 0 3px rgba(45, 137, 239, 0.12);
            transform: translateY(-1px);
            background: #ffffff;
        }

        .botao-area {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        button {
            border: none;
            padding: 14px 38px;
            min-width: 220px;
            border-radius: 14px;
            background: linear-gradient(135deg, #156fe7, #4da1ff);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(21, 111, 231, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(21, 111, 231, 0.28);
            background: linear-gradient(135deg, #0f63d3, #3894fb);
        }

        .assinatura {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88rem;
            color: #6b7d94;
            border-top: 1px solid #e3edf8;
            padding-top: 16px;
        }

        @keyframes gradienteAzul {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes flutuarSuave {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.03); }
            100% { transform: translateY(0px) scale(1); }
        }

        @keyframes moverPontos {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes subirParticula {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            10% { opacity: 1; }
            50% { opacity: 0.6; }
            100% {
                transform: translateY(-110vh) scale(1.2);
                opacity: 0;
            }
        }

        @keyframes pulsoCircuito {
            0% { opacity: 0.25; }
            50% { opacity: 0.7; }
            100% { opacity: 0.25; }
        }

        @media (max-width: 760px) {
            .content {
                padding: 26px 20px;
            }

            .topo {
                align-items: flex-start;
            }

            .titulo-area h1 {
                font-size: 1.55rem;
            }

            form {
                grid-template-columns: 1fr;
            }

            .campo-full,
            .botao-area {
                grid-column: auto;
            }

            button {
                width: 100%;
            }

            .fundo-pontos,
            .circuitos {
                display: none;
            }
        }
        .mensagem-sucesso {
             width: 100%;
             margin-bottom: 18px;
             padding: 14px 16px;
             border-radius: 14px;
             font-weight: 600;
             text-align: center;
             background: linear-gradient(135deg, #dcfce7, #f0fdf4);
             color: #166534;
             border: 1px solid #86efac;
             box-shadow: 0 8px 18px rgba(34, 197, 94, 0.10);

             opacity: 0;
             transform: translateY(-10px);
             animation: aparecer 0.4s ease forwards;
        }

        .mensagem-erro {
            width: 100%;
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            font-weight: 600;
            text-align: center;
            background: linear-gradient(135deg, #ffe3e3, #fff1f1);
            color: #991b1b;
            border: 1px solid #f5a3a3;
            box-shadow: 0 8px 18px rgba(220, 38, 38, 0.10);

            opacity: 0;
            transform: translateY(-10px);
            animation: aparecer 0.4s ease forwards;
        }

        @keyframes aparecer {
           to {
                opacity: 1;
                transform: translateY(0);
           }
        }

        @keyframes desaparecer {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        .topo-acoes {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .botao-voltar {
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 700;
            transition: 0.25s ease;
            display: inline-block;
            background: rgba(255, 255, 255, 0.75);
            color: #28508a;
            border: 1px solid #c8dbfb;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.08);
        }

           .botao-voltar:hover {
                transform: translateY(-2px);
                background: white;
           }
    </style>
</head>
<body>

<div class="fundo-luz"></div>

<div class="particulas">
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
    <div class="particula"></div>
</div>

<div class="fundo-pontos pontos1"></div>
<div class="fundo-pontos pontos2"></div>

<div class="circuitos">
    <div class="circuito c1">
        <div class="h h1"></div>
        <div class="v v1"></div>
        <div class="h h2"></div>
        <div class="no n1"></div>
        <div class="no n2"></div>
    </div>

    <div class="circuito c2">
        <div class="v v1"></div>
        <div class="h h1"></div>
        <div class="v v2"></div>
        <div class="no n1"></div>
        <div class="no n2"></div>
        <div class="no n3"></div>
    </div>

    <div class="circuito c3">
        <div class="h h1"></div>
        <div class="v v1"></div>
        <div class="h h2"></div>
        <div class="no n1"></div>
        <div class="no n2"></div>
    </div>
</div>

<div class="fundo-circulo circulo1"></div>
<div class="fundo-circulo circulo2"></div>
<div class="fundo-circulo circulo3"></div>

<div class="container">
    <div class="top-bar"></div>

    <div class="content">
        <div class="topo-acoes">
            <a href="/admin" class="botao-voltar">← Voltar</a>
        </div>
        <div class="topo">
            <div class="icone">➕</div>
            <div class="titulo-area">
                <h1>Cadastro de Usuário</h1>
                <p>Registre novos usuários do sistema de forma organizada e profissional.</p>
            </div>
        </div>

        <hr class="linha">

        <div id="mensagemSucesso" class="mensagem-sucesso" th:if="${sucesso}">
            Usuário cadastrado com sucesso!
        </div>

        <div id="mensagemErro" class="mensagem-erro" th:if="${erro}">
            <span th:text="${erro}"></span>
        </div>

        <form action="/salvar-usuario" method="post">
            <div class="campo campo-full">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome"
                       th:value="${nome}" required>
            </div>

            <div class="campo">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       th:value="${email}" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha"
                       th:value="${senha}" required>
            </div>

            <div class="campo">
                <label for="tipoUsuario">Tipo de Usuário</label>
                <select id="tipoUsuario" name="tipoUsuario" required>
                    <option value="">Selecione</option>

                    <option value="admin"
                            th:selected="${tipoUsuario == 'admin'}">
                        Administrador
                    </option>

                    <option value="professor"
                            th:selected="${tipoUsuario == 'professor'}">
                        Professor
                    </option>

                    <option value="aluno"
                            th:selected="${tipoUsuario == 'aluno'}">
                        Aluno
                    </option>
                </select>
            </div>

            <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text"
                       id="cpf"
                       name="cpf"
                       maxlength="14"
                       th:value="${cpf}"
                       required
                       oninput="formatarCPF(this)">
            </div>

            <div class="campo">
                <label for="dataNascimento">Data de Nascimento</label>
                <input type="date"
                       id="dataNascimento"
                       name="dataNascimento"
                       th:value="${dataNascimento}"
                       required>
            </div>

            <div class="campo" id="periodoAluno">
                <label for="periodoTurma">
                    Período/Turma
                </label>
                <select id="periodoTurma" name="periodoTurma">

                    <option value="">
                        Selecione
                    </option>

                    <option value="Primeiro">
                        Primeiro Período
                    </option>

                    <option value="Segundo">
                        Segundo Período
                    </option>

                    <option value="Terceiro">
                        Terceiro Período
                    </option>
                </select>
            </div>
            <div class="campo campo-full" id="periodoProfessor" style="display:none;">

                <label>
                    Períodos que o professor atende
                </label>

                <div style="
                    display:flex;
                    gap:20px;
                    margin-top:10px;
                ">
                    <label>
                        <input
                                type="checkbox"
                                name="periodosProfessor"
                                value="Primeiro">
                        Primeiro Período
                    </label>
                    <label>
                        <input
                                type="checkbox"
                                name="periodosProfessor"
                                value="Segundo">
                        Segundo Período
                    </label>
                    <label>
                        <input
                                type="checkbox"
                                name="periodosProfessor"
                                value="Terceiro">
                        Terceiro Período
                    </label>
                </div>
            </div>

            <div class="botao-area">
                <button type="submit">Cadastrar</button>
            </div>
        </form>

        <div class="assinatura">
            Sistema Boletim Online • Área de Cadastro
        </div>
    </div>
</div>

<script>
    function formatarCPF(input) {
        let valor = input.value.replace(/\D/g, "");

        if (valor.length > 11) {
            valor = valor.substring(0, 11);
        }

        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

        input.value = valor;
    }

    window.addEventListener("DOMContentLoaded", function () {
        const mensagemSucesso = document.getElementById("mensagemSucesso");
        const mensagemErro = document.getElementById("mensagemErro");

        function ocultarMensagem(mensagem) {
            if (mensagem) {
                setTimeout(() => {
                    mensagem.style.transition = "opacity 0.5s ease";
                    mensagem.style.opacity = "0";

                    setTimeout(() => {
                        mensagem.remove();
                        window.history.replaceState({}, document.title, "/cadastro-usuario");
                    }, 500);
                }, 3000);
            }
        }

        ocultarMensagem(mensagemSucesso);
        ocultarMensagem(mensagemErro);
    });
</script>

<script>
    window.addEventListener("DOMContentLoaded", function () {
        const sucesso = document.getElementById("mensagemSucesso");
        const erro = document.getElementById("mensagemErro");

        function removerMensagem(elemento) {
            if (elemento) {
                setTimeout(() => {
                    elemento.style.animation = "desaparecer 0.4s ease forwards";
                }, 2500);

                setTimeout(() => {
                    elemento.remove();
                    window.history.replaceState({}, document.title, window.location.pathname);
                }, 3000);
            }
        }
        removerMensagem(sucesso);
        removerMensagem(erro);
    });
</script>
<script>

    window.addEventListener("DOMContentLoaded", function(){

        const tipoUsuario = document.getElementById("tipoUsuario");

        const periodoAluno = document.getElementById("periodoAluno");
        const periodoProfessor = document.getElementById("periodoProfessor");


        function atualizarCampos(){

            if(tipoUsuario.value === "professor"){

                periodoAluno.style.display = "none";
                periodoProfessor.style.display = "block";

            } else if(tipoUsuario.value === "aluno"){

                periodoAluno.style.display = "block";
                periodoProfessor.style.display = "none";

            } else if(tipoUsuario.value === "admin"){

                periodoAluno.style.display = "none";
                periodoProfessor.style.display = "none";

            } else {

                periodoAluno.style.display = "none";
                periodoProfessor.style.display = "none";
            }

        }

        tipoUsuario.addEventListener("change", atualizarCampos);

        atualizarCampos();
    });
</script>

</body>
</html>
