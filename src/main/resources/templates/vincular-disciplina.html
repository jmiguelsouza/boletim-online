<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Vincular Matéria</title>


    <style>


        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }


        body{

            font-family:"Segoe UI", Arial, sans-serif;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;

            background:
            linear-gradient(135deg,#dbeafe,#eff6ff,#ffffff);

            overflow:hidden;
        }


        /* fundo animado */

        .fundo{

        position:fixed;
        inset:0;
        z-index:-1;
        overflow:hidden;

        }


        .bolha{

        position:absolute;

        border-radius:50%;

        background:
        radial-gradient(circle,
        rgba(37,99,235,.35),
        rgba(37,99,235,.05));

        animation:flutuar 12s infinite ease-in-out;

        }


        .b1{

        width:300px;
        height:300px;
        top:-100px;
        left:-80px;

        }


        .b2{

        width:250px;
        height:250px;
        right:-70px;
        top:150px;

        animation-delay:2s;

        }


        .b3{

        width:220px;
        height:220px;
        bottom:-80px;
        left:150px;

        animation-delay:4s;

        }



        @keyframes flutuar{


        0%{
        transform:translateY(0);
        }


        50%{
        transform:translateY(-25px);
        }


        100%{
        transform:translateY(0);
        }


        }



        /* card */


        .container{


        width:100%;
        max-width:650px;

        background:white;

        border-radius:25px;

        box-shadow:
        0 20px 45px rgba(31,66,122,.20);

        overflow:hidden;

        animation:aparecer .5s;

        }



        .topo{

        height:8px;

        background:
        linear-gradient(90deg,#156fe7,#60a5fa,#156fe7);

        }



        .conteudo{

        padding:35px;

        }



        .titulo{

        display:flex;

        align-items:center;

        gap:15px;

        margin-bottom:25px;

        }



        .icone{

        width:60px;
        height:60px;

        border-radius:18px;

        background:
        linear-gradient(135deg,#156fe7,#60a5fa);

        display:flex;

        align-items:center;
        justify-content:center;

        font-size:28px;

        color:white;

        }



        h1{

        color:#1d3557;

        }


        .subtitulo{

        color:#60748b;

        margin-top:5px;

        }




        .sucesso{

        background:#dcfce7;

        color:#166534;

        padding:15px;

        border-radius:12px;

        margin-bottom:20px;

        font-weight:bold;

        }



        label{

        display:block;

        color:#1d3557;

        font-weight:700;

        margin-top:15px;

        }



        select{

        width:100%;

        padding:14px;

        border-radius:12px;

        border:1px solid #cbdcf0;

        margin-top:8px;

        outline:none;

        }



        select:focus{

        border-color:#156fe7;

        box-shadow:0 0 0 3px #dbeafe;

        }



        .periodos{

        margin-top:15px;

        background:#f7fbff;

        padding:20px;

        border-radius:15px;

        border:1px solid #dce9f8;

        }



        .periodos label{

        margin:10px 0;

        font-weight:600;

        cursor:pointer;

        }




        input[type="checkbox"]{

        accent-color:#156fe7;

        margin-right:8px;

        }



        .botao{

        margin-top:25px;

        border:none;

        cursor:pointer;

        padding:14px 25px;

        border-radius:12px;

        background:
        linear-gradient(135deg,#156fe7,#4da1ff);

        color:white;

        font-weight:700;

        font-size:15px;

        transition:.2s;

        }



        .botao:hover{

        transform:translateY(-2px);

        box-shadow:
        0 10px 20px rgba(21,111,231,.25);

        }
        @keyframes aparecer{


        from{

        opacity:0;

        transform:translateY(15px);

        }


        to{

        opacity:1;

        transform:translateY(0);

        }


        }
        .acoes-vinculo{

    margin-top:25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

}


.btn-salvar{

    border:none;

    cursor:pointer;

    padding:12px 25px;

    border-radius:12px;

    background:
    linear-gradient(135deg,#156fe7,#4da1ff);

    color:white;

    font-weight:700;

    font-size:15px;

    transition:.3s;

}


.btn-salvar:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 20px rgba(21,111,231,.25);

}


.btn-voltar{

    text-decoration:none;

    background:white;

    color:#2563eb;

    border:1px solid #bcd1f7;

    padding:12px 22px;

    border-radius:12px;

    font-weight:600;

    transition:.3s;

    display:inline-flex;

    align-items:center;

    justify-content:center;

}


.btn-voltar:hover{

    background:#f5f9ff;

    transform:translateY(-2px);

}
    </style>
</head>
<body>

<div class="fundo">

    <div class="bolha b1"></div>
    <div class="bolha b2"></div>
    <div class="bolha b3"></div>

</div>

<div class="container">

    <div class="topo"></div>

    <div class="conteudo">

        <div class="titulo">

            <div class="icone">
                🔗
            </div>

            <div>

                <h1>
                    Vincular Matéria
                </h1>


                <p class="subtitulo">
                    Associe professores às matérias e períodos
                </p>
            </div>
        </div>

        <div id="mensagemErro"
             th:if="${erro}"
             th:text="${erro}"
             style="
             color:red;
             font-weight:bold;
             margin-bottom:15px;">
        </div>


        <div id="mensagemSucesso"
             th:if="${sucesso}"
             style="
            color:green;
            font-weight:bold;
            margin-bottom:15px;">

            Vínculo criado com sucesso!
        </div>


        <form action="/admin/salvar-vinculo-disciplina" method="post">



            <label>
                📚 Matéria
            </label>


            <select name="disciplinaId">


                <option
                        th:each="m : ${materias}"
                        th:value="${m.id}"
                        th:text="${m.nome}">
                </option>
            </select>


            <label>
                👨‍🏫 Professor
            </label>


            <select name="professorId"
                    id="professorSelect"
                    onchange="atualizarPeriodos()">

                <option
                        th:each="p : ${professores}"
                        th:value="${p.matricula}"
                        th:data-periodos="${#strings.listJoin(p.periodos.![periodo], ',')}"
                        th:text="${p.nome}">
                </option>
            </select>


            <div class="periodos">

                <label>
                    📅 Períodos disponíveis
                </label>

                <div id="listaPeriodos">

                    <label>

                        <input type="checkbox"
                               name="periodos"
                               value="Primeiro">

                        Primeiro período
                    </label>

                    <label>

                        <input type="checkbox"
                               name="periodos"
                               value="Segundo">
                        Segundo período
                    </label>

                    <label>

                        <input type="checkbox"
                               name="periodos"
                               value="Terceiro">

                        Terceiro período
                    </label>
                </div>
            </div>

            <div class="acoes-vinculo">

                <a href="/admin/disciplina" class="btn-voltar">
                    ← Voltar
                </a>

                <button class="btn-salvar">
                    Salvar vínculo
                </button>
            </div>
        </form>
    </div>
</div>
<script>
    setTimeout(function(){

        let erro = document.getElementById("mensagemErro");

        if(erro){
            erro.style.display = "none";
        }
        let sucesso = document.getElementById("mensagemSucesso");

        if(sucesso){
            sucesso.style.display = "none";
        }
    }, 4000);
</script>
<script>


    function atualizarPeriodos(){


    let select =
    document.getElementById("professorSelect");


    let option =
    select.options[select.selectedIndex];


    let permitidos =
    option.dataset.periodos;


    let checks =
    document.querySelectorAll(
    'input[name="periodos"]'
    );



    checks.forEach(c=>{


    c.checked=false;

    c.parentElement.style.display="none";


    });



    if(!permitidos)
    return;



    permitidos.split(",").forEach(p=>{


    checks.forEach(c=>{


    if(c.value===p){


    c.parentElement.style.display="block";


    }


    });


    });

    }
</script>

</body>

</html>
