<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Meu Boletim</title>


    <style>


        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Segoe UI",Arial,sans-serif;
        }



        body{

    min-height:100vh;

    padding:40px;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    background:
        linear-gradient(
        135deg,
        #0f172a 0%,
        #1e3a8a 45%,
        #0f172a 100%
        );

    overflow-y:auto;
    overflow-x:hidden;

}



        /* bolhas de fundo */

        body::before,
        body::after{

        content:"";

        position:absolute;

        border-radius:50%;

        filter:blur(80px);

        opacity:.35;

        z-index:0;

        }



        body::before{

        width:350px;
        height:350px;

        background:#60a5fa;

        top:-100px;
        left:-100px;

        }



        body::after{

        width:300px;
        height:300px;

        background:#22d3ee;

        bottom:-100px;
        right:-80px;

        }






        .container{

        position:relative;

        z-index:1;


        width:100%;

        max-width:950px;


        background:

        rgba(255,255,255,.9);


        backdrop-filter:blur(15px);


        border-radius:30px;


        overflow:hidden;


        box-shadow:

        0 25px 60px rgba(0,0,0,.35);


        animation:

        aparecer .6s ease;


        }



        @keyframes aparecer{

        from{

        opacity:0;
        transform:translateY(20px);

        }

        to{

        opacity:1;
        transform:translateY(0);

        }

        }





        .topo{

        height:10px;


        background:

        linear-gradient(
        90deg,
        #38bdf8,
        #2563eb,
        #7c3aed
        );


        }





        .conteudo{

        padding:40px;

        }





        .cabecalho{

        display:flex;

        justify-content:space-between;

        align-items:center;

        margin-bottom:35px;

        }



        h1{

        color:#1e3a8a;

        font-size:32px;

        }





        .info{

        color:#64748b;

        margin-top:8px;

        font-size:16px;

        }





        .engrenagem{

        position:relative;

        }





        .btn-menu{

        width:64px;

        height:64px;


        border:none;

        border-radius:20px;


        background:

        linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
        );


        color:white;

        font-size:28px;


        cursor:pointer;


        box-shadow:

        0 10px 25px rgba(37,99,235,.4);


        transition:.3s;

        }




        .btn-menu:hover{

        transform:rotate(15deg) scale(1.05);

        }





        .menu{

        position:absolute;

        right:0;

        top:58px;


        width:190px;


        background:white;


        border-radius:18px;


        box-shadow:

        0 20px 40px rgba(0,0,0,.2);


        display:none;


        overflow:hidden;


        }
        .menu::before{

        content:"";

        position:absolute;

        top:-18px;

        left:0;

        width:100%;

        height:18px;

        background:transparent;

        }



        .engrenagem:hover .menu{

        display:block;

        animation:

        menuAnim .2s ease;

        }



        @keyframes menuAnim{

        from{

        opacity:0;
        transform:translateY(-10px);

        }

        to{

        opacity:1;
        transform:translateY(0);

        }

        }




        .menu a{

        display:block;

        padding:16px;


        text-decoration:none;


        color:#1e3a8a;


        font-weight:bold;


        transition:.2s;

        }



        .menu a:hover{

        background:#eff6ff;

        padding-left:22px;

        }





        h2{

        color:#1e3a8a;

        margin-bottom:15px;

        }






        table{

        width:100%;


        border-collapse:separate;

        border-spacing:0 10px;


        margin-top:15px;


        }



        th{

        background:

        linear-gradient(
        90deg,
        #2563eb,
        #1d4ed8
        );


        color:white;


        padding:16px;


        }




        th:first-child{

        border-radius:15px 0 0 15px;

        }


        th:last-child{

        border-radius:0 15px 15px 0;

        }






        td{

        background:white;


        padding:16px;


        text-align:center;


        color:#334155;


        box-shadow:

        0 5px 15px rgba(0,0,0,.06);


        }



        tr{

        transition:.2s;

        }




        tr:hover td{

        transform:scale(1.01);

        background:#f8fafc;

        }






        .aprovado{

        color:#15803d;

        font-weight:bold;


        background:#dcfce7;


        padding:8px 15px;


        border-radius:20px;


        display:inline-block;


        }




        .reprovado{

        color:#b91c1c;

        font-weight:bold;


        background:#fee2e2;


        padding:8px 15px;


        border-radius:20px;


        display:inline-block;


        }



        color:white;


        padding:14px 25px;


        border-radius:15px;


        font-weight:bold;


        transition:.3s;


        box-shadow:

        0 10px 20px rgba(37,99,235,.3);


        }



        .voltar:hover{


        transform:translateY(-3px);


        }

        .modal{

display:none;

position:fixed;

inset:0;

background:rgba(15,23,42,.45);

backdrop-filter:blur(5px);

align-items:center;

justify-content:center;

z-index:999;

}



.modal.ativo{

display:flex;

}



.caixa-modal{

background:white;

padding:35px;

border-radius:22px;

width:380px;

text-align:center;

box-shadow:
0 30px 70px rgba(0,0,0,.30);

}



.caixa-modal h2{

color:#1d3557;

margin-bottom:15px;

}



.caixa-modal p{

color:#64748b;

margin-bottom:25px;

}



.btn-confirmar{

background:#dc2626;

color:white;

border:none;

padding:13px 24px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

margin-right:10px;

}



.btn-cancelar{

background:#e2e8f0;

color:#334155;

border:none;

padding:13px 24px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

}



    </style>


</head>



<body>



<div class="container">



    <div class="topo"></div>



    <div class="conteudo">



        <div class="cabecalho">



            <div>


                <h1>
                    Boletim do Aluno 📘
                </h1>



                <p class="info">

                    Aluno:
                    <span th:text="${aluno.nome}"></span>

                </p>



                <p class="info">

                    Matrícula:
                    <span th:text="${aluno.matricula}"></span>

                </p>



                <p class="info">

                    Período:
                    <span th:text="${aluno.periodoTurma}"></span>

                </p>



            </div>





            <div class="engrenagem">



                <button class="btn-menu">
                    ⚙
                </button>



                <div class="menu">


                    <a href="/minha-conta">
                        👤 Minha Conta
                    </a>



                    <a href="javascript:void(0)"
                       onclick="abrirModalSair()">
                        🚪 Sair
                    </a>


                </div>


            </div>


        </div>






        <h2>
            Notas
        </h2>





        <table>


            <tr>


                <th>
                    Matéria
                </th>


                <th>
                    Média
                </th>


                <th>
                    Frequência
                </th>


                <th>
                    Situação
                </th>


            </tr>





            <tr th:each="item : ${medias}">



                <td th:text="${nomesMaterias[item.key]}">
                </td>




                <td th:text="${#numbers.formatDecimal(item.value,1,2)}">
                </td>




                <td th:text="${frequencias[item.key] + '%'}">
                </td>




                <td>


<span

        th:text="${situacao[item.key]}"

        th:classappend="

${situacao[item.key]=='Aprovado'}

?

'aprovado'

:

'reprovado'

">

</span>


                </td>



            </tr>



        </table>












    </div>


</div>

<div class="modal" id="modalSair">

    <div class="caixa-modal">

        <h2>
            Deseja realmente sair?
        </h2>

        <p>
            Você será desconectado do sistema.
        </p>

        <button class="btn-confirmar"
                onclick="confirmarSair()">

            Sair

        </button>

        <button class="btn-cancelar"
                onclick="fecharModalSair()">

            Cancelar

        </button>

    </div>

</div>
<script>

    function abrirModalSair(){

        document
        .getElementById("modalSair")
        .classList.add("ativo");

    }

    function fecharModalSair(){

        document
        .getElementById("modalSair")
        .classList.remove("ativo");

    }

    function confirmarSair(){

        window.location.href="/logout";

    }

</script>

</body>


</html>
